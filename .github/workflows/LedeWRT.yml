name: 编译 OpenWrt 固件

on:
  workflow_dispatch:
    inputs:
      DEVICE_MODEL:
        description: '设备选择'
        required: true
        type: choice
        options:
          - CW-N5105
          - Wyse 3040
          - 歌华链 MT7621
          - P&W R619AC
          - 京东云雅典娜 AX6600
        default: 'CW-N5105'
      RELEASE:
        description: '发布 Release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  DEVICE_MODEL: ${{ inputs.DEVICE_MODEL }}

jobs:
  build_openwrt:
    name: 编译 ${{ inputs.DEVICE_MODEL }} 固件
    runs-on: ubuntu-22.04
    
    steps:
      - name: 清理磁盘空间并初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker image prune -f
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
          sudo -E apt-mark hold grub-efi-amd64-signed
          sudo -E apt update
          sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap*
          sudo -E apt -y full-upgrade
          sudo -E apt -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E systemctl daemon-reload
          sudo -E apt -y autoremove --purge
          sudo -E apt clean
          sudo -E timedatectl set-timezone "Asia/Shanghai"
      - name: 拉取源代码 (LEDE)
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede

      - name: 拉取本地配置
        uses: actions/checkout@v4
        with:
          path: local_repo

      - name: 释放 Ubuntu 运行环境磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
  
      - name: 磁盘空间释放完成状态
        run: |
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="
      - name: 生成安全的缓存前缀
        id: set-prefix  # 核心修改 1：给这一步赋予一个唯一的 ID
        run: |
          SAFE_MODEL=$(echo "${{ env.DEVICE_MODEL }}" | sed 's/[^a-zA-Z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//')
          echo "prefix=$SAFE_MODEL" >> $GITHUB_OUTPUT  # 核心修改 2：写入到官方的 output 通道中
      - name: 配置原生编译缓存 (CCache & Toolchain)
        uses: actions/cache@v4
        with:
          path: |
            .ccache
            staging_dir/host*
            staging_dir/toolchain-*
          key: ${{ runner.os }}-wrtbuild-${{ steps.set-prefix.outputs.prefix }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-wrtbuild-${{ steps.set-prefix.outputs.prefix }}-
            
      - name: 设置 CCache 环境变量
        run: |
          echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache" >> $GITHUB_ENV
      - name: 配置下载缓存 (DL 目录)
        uses: actions/cache@v4
        env:
          cache-name: cache-openwrt-dl
        with:
          path: dl
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            
      - name: 更新定制源
        run: |
          chmod +x local_repo/scripts/update_feeds.sh
          ./local_repo/scripts/update_feeds.sh
          
      - name: 生成配置文件
        run: |
          rm -f ./.config*
          touch ./.config
          
          # ======================== 设备与独立插件配置 ========================
          CONFIG_FILE="local_repo/configs/${DEVICE_MODEL}.config"
          if [ -f "$CONFIG_FILE" ]; then
            cat "$CONFIG_FILE" >> .config
          else
            echo "错误：未知的设备型号 '$DEVICE_MODEL' 或配置文件缺失！"
            exit 1
          fi
          
          # ======================== 以下为所有设备通用的基础设置 ========================
          cat local_repo/configs/base.config >> .config
          
          # ======================== 固件定制部分结束 ========================
          make defconfig
          
          # ====== 后置修补与网络配置 ======
          chmod +x local_repo/scripts/post_config.sh
          ./local_repo/scripts/post_config.sh "$DEVICE_MODEL"
      - name: 下载依赖包
        run: make download -j16
          
      - name: 修补 mt76 内核 API 兼容性（仅在启用开源驱动时）
        run: |
          chmod +x local_repo/scripts/patch_mt76.sh
          ./local_repo/scripts/patch_mt76.sh
      - name: 修补 luci-app-mtwifi 高级设置 502 崩溃
        run: |
          chmod +x local_repo/scripts/patch_mtwifi_luci.sh
          ./local_repo/scripts/patch_mtwifi_luci.sh
      - name: 编译固件
        run: |
          make -j$(nproc) || make -j4 V=s
          echo "======================="
          echo "磁盘空间使用情况:"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1 ./ --exclude=build_dir --exclude=bin
          du -h --max-depth=1 ./build_dir
          du -h --max-depth=1 ./bin
          
      - name: 整理打包文件
        run: |
          mkdir -p ./artifact/package
          mkdir -p ./artifact/buildinfo
          mkdir -p ./artifact/firmware
          rm -rf $(find ./bin/targets/ -type d -name "packages")
          cp -rf $(find ./bin/packages/ -type f -name "*.ipk") ./artifact/package/
          cp -rf $(find ./bin/targets/ -type f -name "*.buildinfo" -o -name "*.manifest") ./artifact/buildinfo/
          # 收集固件镜像到 firmware 目录（用于 Release 上传）
          cp -rf $(find ./bin/targets/ -type f -name "*.img.gz" -o -name "*.bin" -o -name "*.img") ./artifact/firmware/ 2>/dev/null || true

      - name: 生成 Release 标签
        id: tag
        run: |
          SAFE_MODEL=$(echo "${{ env.DEVICE_MODEL }}" | sed 's/[^a-zA-Z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//')
          BUILD_DATE=$(date +"%Y%m%d-%H%M")
          echo "release_tag=${SAFE_MODEL}_${BUILD_DATE}" >> $GITHUB_OUTPUT
          echo "build_date=$(date +"%Y-%m-%d %H:%M")" >> $GITHUB_OUTPUT
          
      - name: 上传编译信息
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.DEVICE_MODEL }}_编译信息_buildinfo
          path: ./artifact/buildinfo/

      - name: 上传所有软件包
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.DEVICE_MODEL }}_离线插件包_package
          path: ./artifact/package/

      - name: 上传最终固件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.DEVICE_MODEL }}_固件
          path: ./bin/targets/

      - name: 发布 Release
        if: inputs.RELEASE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "${{ env.DEVICE_MODEL }} 固件 (${{ steps.tag.outputs.build_date }})"
          body: |
            ## 📦 固件信息
            - **设备型号**: ${{ env.DEVICE_MODEL }}
            - **构建时间**: ${{ steps.tag.outputs.build_date }} (Asia/Shanghai)
            - **源码仓库**: coolsnowwolf/lede

            > 默认管理地址: `10.10.10.1`
          files: ./artifact/firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
